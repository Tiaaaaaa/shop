<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8">
  <title>Inserimento</title>
  <link rel="stylesheet" href="./stylesheets/general.css">
  <link rel="stylesheet" href="./stylesheets/index.css">

</head>
<body>

  <button class="button" id="next" onclick="auth()">Visualizza statistiche</button>
  <button class="button" id="back" onclick="back()">Visualizza inserimento</button>

  <div id="auth">

    <p class="subtitle">Inserisci la password</p>

    <form action="./data/data.php" method="post">
      <input type="password" name="password" value="">
    </form>

  </div>

  <div id="container">

    <p class="title">MercaLibro</p>
    <p class="subtitle "id="date"></p>

    <p class="subtitle">Identificare il cliente qua sotto</p>
    <form action="./resoconto/resoconto.php" method="post">
      <input onchange="refresh()" type="email" name="client" autofocus placeholder="email"><br>
    </form>

  </div>

  <script type="text/javascript">

    let a = new Date();

    document.getElementById('date').innerHTML = "oggi è il <br> " + a.getDate() + "/" + a.getMonth() + "/" +  a.getFullYear();

    function auth() {

      document.getElementById('next').style.display = "none";
      document.getElementById('back').style.display = "block";

      document.getElementById('container').style.opacity = "0";
      document.getElementById('auth').style.opacity = "100";

      document.getElementById('auth').style.zIndex = "2";

    }

    function back() {

      document.getElementById('next').style.display = "block";
      document.getElementById('back').style.display = "none";

      document.getElementById('container').style.opacity = "100";
      document.getElementById('auth').style.opacity = "0";

      document.getElementById('auth').style.zIndex = "-1";

    }

  </script>

</body>
</html>
